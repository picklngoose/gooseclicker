<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HONK CLICKER 🪿</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grass:    #4caf50;
      --grass-d:  #388e3c;
      --gold:     #ffd54f;
      --gold-d:   #ffb300;
      --ink:      #1b5e20;
      --panel:    #ffffffcc;
      --panel-s:  #ffffff;
      --shadow:   0 4px 24px #0002;
      --bg:       linear-gradient(175deg, #b9f6ca 0%, #e8f5e9 40%, #fff9c4 100%);
      --muted:    #555;
      --teaser:   #999;
      --border:   #0001;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      --grass:    #66bb6a;
      --grass-d:  #a5d6a7;
      --gold:     #ffd54f;
      --gold-d:   #ffe082;
      --ink:      #e8f5e9;
      --panel:    #1e2d1ecc;
      --panel-s:  #1e2d1e;
      --shadow:   0 4px 24px #0007;
      --bg:       linear-gradient(175deg, #0d1a0d 0%, #111d11 40%, #1a1a08 100%);
      --muted:    #aaa;
      --teaser:   #666;
      --border:   #ffffff0a;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      text-align: center;
      padding: 28px 16px 0;
      position: relative;
    }
    .dark-toggle {
      position: absolute;
      top: 24px;
      right: 20px;
      background: var(--panel);
      border: 2px solid var(--grass);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background 0.2s, transform 0.15s;
      color: var(--ink);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
    }
    .dark-toggle:hover { transform: scale(1.08); }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 3.6rem);
      color: var(--ink);
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 var(--gold);
    }
    .honk-counter {
      margin-top: 6px;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 800;
      color: var(--grass-d);
    }
    .hps {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── LAYOUT ──────────────────────────────────────── */
    .game-layout {
      display: flex;
      gap: 20px;
      max-width: 960px;
      margin: 20px auto 0;
      padding: 0 16px 40px;
      align-items: flex-start;
    }

    /* ── GOOSE AREA ──────────────────────────────────── */
    .goose-area {
      flex: 1 1 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .goose-stage {
      position: relative;
      width: 240px;
      height: 240px;
    }

    .goose-btn {
      all: unset;
      cursor: pointer;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 130px;
      border-radius: 50%;
      transition: transform 0.08s ease;
      filter: drop-shadow(0 8px 12px #0003);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .goose-btn:active { transform: scale(0.88); }
    .goose-btn.honked  { animation: honk-bounce 0.18s ease; }

    @keyframes honk-bounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.85) rotate(-6deg); }
      70%  { transform: scale(1.08) rotate(3deg); }
      100% { transform: scale(1); }
    }

    /* grass platform */
    .grass-pad {
      width: 200px;
      height: 28px;
      background: var(--grass);
      border-radius: 50%;
      box-shadow: 0 6px 0 var(--grass-d);
      margin-top: -10px;
    }

    /* ── FLOATING PARTICLES ──────────────────────────── */
    .particle {
      position: fixed;
      pointer-events: none;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--ink);
      font-weight: 900;
      text-shadow: 1px 1px 0 var(--gold);
      z-index: 999;
      animation: float-up 0.9s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
    }

    /* ── UPGRADES PANEL ──────────────────────────────── */
    .upgrades-panel {
      flex: 0 0 280px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--ink);
      text-align: center;
      padding: 6px 0 2px;
      border-bottom: 3px dashed var(--grass);
      margin-bottom: 4px;
    }

    .cat-header {
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      color: var(--grass-d);
      margin: 12px 0 4px 2px;
      letter-spacing: 0.5px;
    }
    .cat-header:first-child { margin-top: 2px; }

    .teaser {
      text-align: center;
      font-size: 0.75rem;
      color: var(--teaser);
      padding: 10px 6px 4px;
      font-style: italic;
    }
    .teaser span {
      font-size: 1.1rem;
      display: block;
      margin-bottom: 2px;
    }

    .upgrade-card {
      background: var(--panel);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      transition: border 0.15s, transform 0.15s, opacity 0.2s;
      cursor: pointer;
    }
    .upgrade-card:hover:not(.locked) {
      border-color: var(--grass);
      transform: translateY(-2px);
    }
    .upgrade-card.locked {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .upgrade-card.locked:hover { transform: none; }

    .upg-icon { font-size: 2rem; flex-shrink: 0; }
    .upg-info { flex: 1; }
    .upg-name {
      font-weight: 800;
      font-size: 0.95rem;
      line-height: 1.2;
    }
    .upg-desc {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .upg-cost {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      color: var(--gold-d);
      text-align: right;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .upg-count {
      display: inline-block;
      background: var(--grass);
      color: #fff;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 1px 7px;
      margin-left: 4px;
    }

    /* ── STATS BAR ───────────────────────────────────── */
    .stats-bar {
      margin-top: 16px;
      background: var(--panel);
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--muted);
      box-shadow: var(--shadow);
      text-align: center;
      line-height: 1.7;
      width: 100%;
      max-width: 260px;
    }
    .stats-bar span { font-weight: 800; color: var(--ink); }

    /* ── REBIRTH BAR ─────────────────────────────────── */
    .rebirth-bar {
      width: 100%;
      max-width: 260px;
      background: var(--panel);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .rebirth-feathers {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      color: var(--gold-d);
      margin-bottom: 4px;
    }
    .rebirth-bonus {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .rebirth-bonus strong { color: var(--ink); }
    .rebirth-req {
      font-size: 0.72rem;
      color: var(--teaser);
      margin-bottom: 8px;
      font-style: italic;
    }
    .rebirth-btn {
      all: unset;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7043, #ff8a65);
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      padding: 8px 22px;
      border-radius: 99px;
      box-shadow: 0 3px 12px #ff704355;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
      display: inline-block;
    }
    .rebirth-btn:not(:disabled):hover {
      transform: scale(1.06);
      box-shadow: 0 5px 18px #ff704388;
    }
    .rebirth-btn:disabled, .rebirth-btn.dim {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }
    .rebirth-btn.ready {
      animation: rebirth-pulse 1.6s ease-in-out infinite;
    }
    @keyframes rebirth-pulse {
      0%, 100% { box-shadow: 0 3px 12px #ff704355; }
      50%       { box-shadow: 0 6px 28px #ff7043cc; transform: scale(1.04); }
    }

    /* ── REBIRTH MODAL ───────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000a;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fade-in 0.15s ease;
    }
    .modal-overlay.hidden { display: none; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--panel-s);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 48px #0006;
    }
    .modal-box h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: #ff7043;
      margin-bottom: 8px;
    }
    .modal-box p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .modal-box p strong { color: var(--ink); }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .modal-confirm {
      all: unset;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7043, #ff8a65);
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      padding: 10px 24px;
      border-radius: 99px;
      box-shadow: 0 3px 12px #ff704355;
      transition: transform 0.15s;
    }
    .modal-confirm:hover { transform: scale(1.05); }
    .modal-cancel {
      all: unset;
      cursor: pointer;
      background: var(--panel);
      color: var(--ink);
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      padding: 10px 24px;
      border-radius: 99px;
      border: 2px solid var(--grass);
      transition: transform 0.15s;
    }
    .modal-cancel:hover { transform: scale(1.05); }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 640px) {
      .game-layout { flex-direction: column; align-items: center; }
      .upgrades-panel { width: 100%; max-width: 400px; }
    }
  </style>
</head>
<body>

<header>

  <h1>🪿 Goose Clicker</h1>

<!-- Rebirth confirmation modal -->

    <div class="modal-actions">

      <button class="modal-cancel" id="modalCancel">Cancel</button>

  </div>
</div>

<div class="game-layout">

  <!-- GOOSE -->

    </div>

    <!-- Rebirth -->
    <div class="rebirth-bar">

  </div>

  <!-- UPGRADES -->

    <div class="panel-title">Upgrades</div>
    <div id="upgradeList"></div>

</div>

  { id: 'reactor',       type:'auto',  icon:'☢️',  name:'Honk Reactor',         desc:'+130M honks/sec',               baseCost:6e12,        costScale:1.64, value:130e6,       unlockAt:2e12,       count:0 },
  { id: 'singularity',   type:'auto',  icon:'🕳️',  name:'Goose Singularity',    desc:'+550M honks/sec',               baseCost:50e12,       costScale:1.65, value:550e6,       unlockAt:18e12,      count:0 },
  { id: 'uflock',        type:'auto',  icon:'🛸',  name:'Universal Flock',      desc:'+2.2B honks/sec',               baseCost:450e12,      costScale:1.66, value:2.2e9,       unlockAt:150e12,     count:0 },
  { id: 'temporal',      type:'auto',  icon:'🕰️',  name:'Temporal Migration',   desc:'+9B honks/sec',                 baseCost:4e15,        costScale:1.67, value:9e9,         unlockAt:1.5e15,     count:0 },
  { id: 'qgaggle',       type:'auto',  icon:'🧬',  name:'Quantum Gaggle',       desc:'+38B honks/sec',                baseCost:35e15,       costScale:1.68, value:38e9,        unlockAt:12e15,      count:0 },
  { id: 'darkmatter',    type:'auto',  icon:'🌑',  name:'Dark Matter Geese',    desc:'+160B honks/sec',               baseCost:300e15,      costScale:1.69, value:160e9,       unlockAt:100e15,     count:0 },
  { id: 'cosmicflock',   type:'auto',  icon:'🔆',  name:'Cosmic Flock',         desc:'+700B honks/sec',               baseCost:2.5e18,      costScale:1.7,  value:700e9,       unlockAt:900e15,     count:0 },
  { id: 'multiverse',    type:'auto',  icon:'🌐',  name:'Multiversal Parade',   desc:'+3T honks/sec',                 baseCost:22e18,       costScale:1.7,  value:3e12,        unlockAt:8e18,       count:0 },
  { id: 'voidgeese',     type:'auto',  icon:'👻',  name:'Void Geese',           desc:'+13T honks/sec',                baseCost:190e18,      costScale:1.72, value:13e12,       unlockAt:70e18,      count:0 },
  { id: 'godgoose',      type:'auto',  icon:'👑',  name:'God Goose',            desc:'+55T honks/sec',                baseCost:1.6e21,      costScale:1.72, value:55e12,       unlockAt:600e18,     count:0 },
  { id: 'eternalflock',  type:'auto',  icon:'🌺',  name:'The Eternal Flock',    desc:'+250T honks/sec',               baseCost:14e21,       costScale:1.75, value:250e12,      unlockAt:5e21,       count:0 },
  { id: 'omnihonk',      type:'auto',  icon:'🏆',  name:'Omni Honk Engine',     desc:'+1,200T honks/sec',             baseCost:120e21,      costScale:1.78, value:1200e12,     unlockAt:45e21,      count:0 },
];

function getCost(upg) {
  return Math.ceil(upg.baseCost * Math.pow(upg.costScale, upg.count));
}

// ── REBIRTH HELPERS ───────────────────────────────────
function rebirthCost() {
  // 1M, 10M, 100M, 1B, 10B … (×10 each time)
  return 1e6 * Math.pow(10, state.rebirthCount);
}
function rebirthMult() {
  // each feather = +50% production (additive), so 1 feather = 1.5×, 4 = 3×, 10 = 6×
  return 1 + state.rebirthCount * 0.5;
}

// ── RECALCULATE DERIVED STATS ─────────────────────────
function recalcStats() {
  const mult = rebirthMult();
  state.honksPerClick = (1 + UPGRADES
    .filter(u => u.type === 'click')
    .reduce((s, u) => s + u.value * u.count, 0)) * mult;

  state.honksPerSec = UPGRADES
    .filter(u => u.type === 'auto')
    .reduce((s, u) => s + u.value * u.count, 0) * mult;
}

// ── RENDER UI ─────────────────────────────────────────
let _lastVisibleIds = '';

// updateDisplay: cheap — only touches text nodes. Safe to call every tick.
function updateDisplay() {
  document.getElementById('honkDisplay').textContent =
    formatNum(Math.floor(state.honks)) + ' HONKS';
  document.getElementById('hpsDisplay').textContent =
    formatNum(state.honksPerSec) + ' honks / sec';
  document.getElementById('totalClicks').textContent = formatNum(state.totalClicks);
  document.getElementById('allTimeHonks').textContent = formatNum(Math.floor(state.grandTotalHonks));

  // Rebirth bar
  const cost = rebirthCost();
  const ready = state.allTimeHonks >= cost;
  document.getElementById('rebirthFeathers').textContent =
    '🪶 Golden Feathers: ' + state.rebirthCount;
  document.getElementById('rebirthBonus').innerHTML = state.rebirthCount > 0
    ? `All production: <strong>×${rebirthMult().toFixed(1)}</strong>`
    : 'No bonus yet';
  document.getElementById('rebirthReq').textContent = ready
    ? '✅ Ready to rebirth!'
    : `Need ${formatNum(cost)} honks this run`;
  const btn = document.getElementById('rebirthBtn');
  btn.classList.toggle('ready', ready);
  btn.classList.toggle('dim', !ready);

  // Check if a new upgrade became visible — if so, rebuild the list
  const visibleIds = UPGRADES
    .filter(u => state.allTimeHonks >= u.unlockAt)
    .map(u => u.id).join(',');
  if (visibleIds !== _lastVisibleIds) {
    _lastVisibleIds = visibleIds;
    renderUpgrades();
    return;
  }

  // Update locked/unlocked state on existing cards without rebuilding DOM
  document.querySelectorAll('.upgrade-card').forEach(card => {
    const upg = UPGRADES.find(u => u.id === card.dataset.upgId);
    if (!upg) return;
    card.classList.toggle('locked', state.honks < getCost(upg));
  });
}

// renderUpgrades: rebuilds the upgrade list DOM. Only call on purchase or init.
function renderUpgrades() {
  const list = document.getElementById('upgradeList');
  list.innerHTML = '';

  const categories = [
    { type: 'click', label: '👆 Clicking Power' },
    { type: 'auto',  label: '🪿 Honks Per Second' },
  ];

  categories.forEach(({ type, label }) => {
    const visible = UPGRADES.filter(u => u.type === type && state.allTimeHonks >= u.unlockAt);
    if (visible.length === 0) return;

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.textContent = label;
    list.appendChild(header);

    visible.forEach(upg => {
      const cost = getCost(upg);
      const card = document.createElement('div');
      card.className = 'upgrade-card' + (state.honks >= cost ? '' : ' locked');
      card.dataset.upgId = upg.id;
      card.innerHTML = `
        <div class="upg-icon">${upg.icon}</div>
        <div class="upg-info">
          <div class="upg-name">${upg.name}
            ${upg.count > 0 ? `<span class="upg-count">${upg.count}</span>` : ''}
          </div>
          <div class="upg-desc">${upg.desc}</div>
        </div>
        <div class="upg-cost">🪙 ${formatNum(cost)}</div>
      `;
      card.addEventListener('click', () => buyUpgrade(upg));
      list.appendChild(card);
    });
  });

  // Show a teaser if the very next locked upgrade is close
  const nextHidden = UPGRADES
    .filter(u => state.allTimeHonks < u.unlockAt)
    .sort((a, b) => a.unlockAt - b.unlockAt)[0];
  if (nextHidden) {
    const teaser = document.createElement('div');
    teaser.className = 'teaser';
    teaser.innerHTML = `<span>???</span> Earn <strong>${formatNum(nextHidden.unlockAt)}</strong> total honks to unlock something new…`;
    list.appendChild(teaser);
  }
}

function formatNum(n) {
  if (n >= 1e21) return (n / 1e21).toFixed(2) + ' Sx';
  if (n >= 1e18) return (n / 1e18).toFixed(2) + ' Qi';
  if (n >= 1e15) return (n / 1e15).toFixed(2) + ' Qa';
  if (n >= 1e12) return (n / 1e12).toFixed(2) + ' T';
  if (n >= 1e9)  return (n / 1e9).toFixed(2)  + ' B';
  if (n >= 1e6)  return (n / 1e6).toFixed(2)  + ' M';
  if (n >= 1e3)  return (n / 1e3).toFixed(1)  + 'K';
  return Math.floor(n).toString();
}

// ── BUY UPGRADE ───────────────────────────────────────
function buyUpgrade(upg) {
  const cost = getCost(upg);
  if (state.honks < cost) return;
  state.honks -= cost;
  upg.count++;
  recalcStats();
  renderUpgrades();
  updateDisplay();
}

// ── CLICK HANDLER ─────────────────────────────────────
const gooseBtn = document.getElementById('gooseBtn');

gooseBtn.addEventListener('click', (e) => {
  const gained = state.honksPerClick;
  state.honks += gained;
  state.allTimeHonks += gained;
  state.grandTotalHonks += gained;
  state.totalClicks++;

  // bounce animation
  gooseBtn.classList.remove('honked');
  void gooseBtn.offsetWidth; // reflow
  gooseBtn.classList.add('honked');

  spawnParticle(e.clientX, e.clientY, '+' + formatNum(Math.round(gained)));
  updateDisplay();
});

// ── PARTICLES ─────────────────────────────────────────
function spawnParticle(x, y, text) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = text;
  el.style.left = (x - 20 + (Math.random() - 0.5) * 30) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ── AUTO-TICK ─────────────────────────────────────────
let lastTick = performance.now();
function tick(now) {
  const dt = (now - lastTick) / 1000;
  lastTick = now;
  if (state.honksPerSec > 0) {
    const gained = state.honksPerSec * dt;
    state.honks += gained;
    state.allTimeHonks += gained;
    state.grandTotalHonks += gained;
    updateDisplay();
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ── REBIRTH ───────────────────────────────────────────
const rebirthModal = document.getElementById('rebirthModal');
document.getElementById('rebirthBtn').addEventListener('click', () => {
  if (state.allTimeHonks < rebirthCost()) return;
  const nextMult = rebirthMult() + 0.5;
  document.getElementById('modalText').innerHTML =
    `This will reset your honks and all upgrades.<br><br>
     You'll earn a <strong>Golden Feather 🪶</strong>, bringing your total to
     <strong>${state.rebirthCount + 1}</strong> — giving <strong>×${nextMult.toFixed(1)}</strong>
     to all production permanently.`;
  rebirthModal.classList.remove('hidden');
});
document.getElementById('modalCancel').addEventListener('click', () => {
  rebirthModal.classList.add('hidden');
});
document.getElementById('modalConfirm').addEventListener('click', () => {
  rebirthModal.classList.add('hidden');
  doRebirth();
});
rebirthModal.addEventListener('click', (e) => {
  if (e.target === rebirthModal) rebirthModal.classList.add('hidden');
});

function doRebirth() {
  state.rebirthCount++;
  state.honks = 0;
  state.allTimeHonks = 0;
  state.totalClicks = 0;
  UPGRADES.forEach(u => u.count = 0);
  _lastVisibleIds = '';
  recalcStats();
  renderUpgrades();
  updateDisplay();
  // Flash a particle in the center
  spawnParticle(window.innerWidth / 2, window.innerHeight / 2, '🪶 REBIRTH!');
}

// ── DARK MODE ─────────────────────────────────────────
const darkToggle = document.getElementById('darkToggle');
darkToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  darkToggle.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
});

// ── INIT ──────────────────────────────────────────────
recalcStats();
renderUpgrades();
updateDisplay();
</script>
</body>
</html>
